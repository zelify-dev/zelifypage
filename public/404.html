<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada | Zelify</title>
    <script>
        // Intenta redirigir a la página correcta basada en la URL
        const path = window.location.pathname;

        // Manejo de rutas de trabajos
        if (path.startsWith('/jobs/') && !path.includes('index.html') && !path.includes('apply')) {
            const jobId = path.split('/').pop();
            if (jobId) {
                window.location.href = `/jobs/${jobId}/index.html`;
            }
        }

        // Manejo de la ruta de aplicación
        if (path.startsWith('/jobs/apply') && !path.includes('index.html')) {
            window.location.href = '/jobs/apply/index.html' + window.location.search;
        }

        // Manejo de rutas en español
        if (path.startsWith('/es/')) {
            const esPath = path.replace('/es/', '/es/index.html');
            window.location.href = esPath;
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9fafb;
            color: #111827;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 6rem;
            font-weight: 700;
            color: #2563eb;
            margin: 0 0 1rem;
        }

        h2 {
            font-size: 2rem;
            font-weight: 600;
            margin: 0 0 1.5rem;
        }

        p {
            font-size: 1.25rem;
            color: #4b5563;
            max-width: 32rem;
            margin: 0 auto 2rem;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        @media (min-width: 640px) {
            .buttons {
                flex-direction: row;
            }
        }

        a {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            font-weight: 500;
            text-decoration: none;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }

        .primary {
            background-color: #2563eb;
            color: white;
        }

        .primary:hover {
            background-color: #1d4ed8;
        }

        .secondary {
            background-color: white;
            color: #2563eb;
            border: 1px solid #2563eb;
        }

        .secondary:hover {
            background-color: #eff6ff;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>404</h1>
        <h2>Página no encontrada</h2>
        <p>
            Lo sentimos, la página que estás buscando no existe o ha sido movida.
        </p>
        <div class="buttons">
            <a href="/" class="primary">Volver al inicio</a>
            <a href="/jobs" class="secondary">Ver trabajos disponibles</a>
        </div>
    </div>
</body>

</html>
